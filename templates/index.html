<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>
    <h1>Task Manager</h1>

    <form method="POST">
        <input type="text" name="task"placeholder="Enter a task">
        <button type="submit">Add Task</button>
    </form>

    <ul>
    {% for task in tasks %}
        <li>
            {{ task[1] }}
            <a href="/delete/{{ task[0] }}">
                <button>Delete</button>
            </a>
        </li>
    {% endfor %}
</ul>
</body>
</html>
