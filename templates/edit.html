<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
</head>
<body>

<h1>Edit Task</h1>

<form method="POST">

    <input type="text"
           name="task"
           value="{{ task[1] }}"
           required>

    <input type="date"
           name="due_date"
           value="{{ task[2] }}"
           required>

    <button type="submit">Save Changes</button>

</form>

</body>
</html>
